<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Harborbucks — Two-Factor Auth</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0c1a2e;--navy-mid:#132238;--navy-light:#1a3050;--brass:#c49a3c;--brass-light:#e0b84a;--brass-dim:#8a6a20;--cream:#f0e8d8;--cream-dim:#b8ad99;--red:#c0392b;--rule:rgba(196,154,60,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(196,154,60,.06) 39px,rgba(196,154,60,.06) 40px);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;padding:24px}
.brand{text-align:center;margin-bottom:36px}
.brand h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--brass-light);letter-spacing:.04em;line-height:1}
.brand p{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-dim);margin-top:6px}
.card{background:var(--navy-mid);border:1px solid var(--rule);border-top:3px solid var(--brass);padding:36px 40px;width:100%;max-width:360px;text-align:center}
.card-title{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:8px}
.card-sub{font-size:.72rem;color:var(--cream-dim);margin-bottom:28px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;text-align:left}
label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim)}
input{background:var(--navy-light);border:1px solid var(--rule);border-bottom:2px solid var(--brass-dim);color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:2rem;font-weight:500;padding:14px 12px;outline:none;transition:border-color .15s;width:100%;letter-spacing:.4em;text-align:center}
input:focus{border-bottom-color:var(--brass-light)}
input::placeholder{font-size:1.2rem;letter-spacing:.2em;color:rgba(176,166,148,.3)}
.btn{width:100%;background:var(--brass);color:var(--navy);border:none;font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .15s}
.btn:hover:not(:disabled){background:var(--brass-light)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--cream-dim);border:1px solid var(--rule);margin-top:8px}
.btn-ghost:hover{border-color:var(--brass-dim);color:var(--cream)}
.error{font-size:.75rem;color:#e08080;background:rgba(192,57,43,.12);border-left:3px solid var(--red);padding:10px 12px;margin-bottom:16px;text-align:left;display:none}
.error.show{display:block}
.back{margin-top:20px;font-size:.68rem;color:var(--brass-dim);text-decoration:none;display:inline-block}
.back:hover{color:var(--brass)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .35s ease}
</style></head><body>
<div class="brand"><h1>⚓ Harborbucks</h1><p>Voucher Ledger — Internal Use Only</p></div>
<div class="card">
  <div class="card-title">Two-Factor Authentication</div>
  <div class="card-sub" id="sub">Enter the 6-digit code from your authenticator app.</div>
  <div class="error" id="err"></div>
  <div class="field"><label>Authentication Code</label>
    <input id="token" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code" autofocus>
  </div>
  <button class="btn" id="btn" onclick="verify()">Verify</button>
  <button class="btn btn-ghost" id="resend-btn" style="display:none" onclick="resend()">Resend Code</button>
  <div><a href="/login" class="back">← Back to login</a></div>
</div>
<script>
let mfaType='totp';
fetch('/auth/mfa-info').then(r=>r.json()).then(d=>{
  mfaType=d.type;
  if(mfaType==='email'){
    document.getElementById('sub').textContent='Enter the 6-digit code sent to your email.';
    document.getElementById('resend-btn').style.display='block';
  }
});
document.getElementById('token').addEventListener('input',e=>{
  e.target.value=e.target.value.replace(/\D/g,'').slice(0,6);
  if(e.target.value.length===6) verify();
});
document.getElementById('token').addEventListener('keydown',e=>{ if(e.key==='Enter') verify(); });
async function verify(){
  const token=document.getElementById('token').value.trim();
  const btn=document.getElementById('btn');
  if(token.length!==6) return showErr('Enter the full 6-digit code.');
  btn.disabled=true; btn.textContent='Verifying…'; hideErr();
  try{
    const res=await fetch('/auth/mfa',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    const d=await res.json();
    if(!res.ok){
      document.getElementById('token').value='';
      document.getElementById('token').focus();
      document.getElementById('token').classList.add('shake');
      document.getElementById('token').addEventListener('animationend',()=>document.getElementById('token').classList.remove('shake'),{once:true});
      return showErr(d.error||'Verification failed.');
    }
    window.location.href=d.redirect;
  }catch(e){ showErr('Network error.'); }
  finally{ btn.disabled=false; btn.textContent='Verify'; }
}
async function resend(){
  const btn=document.getElementById('resend-btn');
  btn.disabled=true; btn.textContent='Sending…';
  try{
    const res=await fetch('/auth/mfa/resend',{method:'POST'});
    const d=await res.json();
    if(!res.ok) return showErr(d.error||'Failed to resend.');
    showErr('New code sent. Check your email.'); document.getElementById('err').style.color='var(--brass)';
  }catch(e){ showErr('Network error.'); }
  finally{ btn.disabled=false; btn.textContent='Resend Code'; }
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');e.style.color='#e08080';e.style.background='rgba(192,57,43,.12)';e.style.borderLeftColor='var(--red)'}
function hideErr(){document.getElementById('err').classList.remove('show')}
</script><script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script></body></html>
