<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Harborbucks — Set Up Authenticator</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0c1a2e;--navy-mid:#132238;--navy-light:#1a3050;--brass:#c49a3c;--brass-light:#e0b84a;--brass-dim:#8a6a20;--cream:#f0e8d8;--cream-dim:#b8ad99;--red:#c0392b;--rule:rgba(196,154,60,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(196,154,60,.06) 39px,rgba(196,154,60,.06) 40px);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;padding:24px}
.brand{text-align:center;margin-bottom:36px}
.brand h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--brass-light);letter-spacing:.04em;line-height:1}
.brand p{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-dim);margin-top:6px}
.card{background:var(--navy-mid);border:1px solid var(--rule);border-top:3px solid var(--brass);padding:36px 40px;width:100%;max-width:440px}
.card-title{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:8px}
.card-sub{font-size:.72rem;color:var(--cream-dim);margin-bottom:20px;line-height:1.6}
.steps{display:flex;flex-direction:column;gap:16px;margin-bottom:24px}
.step{display:flex;gap:12px;align-items:flex-start}
.step-num{min-width:22px;height:22px;background:var(--brass-dim);color:var(--navy);font-size:.65rem;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-body{font-size:.76rem;color:var(--cream-dim);line-height:1.6}
.step-body strong{color:var(--cream)}
.qr-wrap{background:white;padding:10px;display:inline-block;margin:10px 0 2px}
.qr-wrap img{display:block;width:188px;height:188px}
.secret-box{font-size:.75rem;background:var(--navy-light);border:1px solid var(--rule);padding:8px 12px;color:var(--brass);letter-spacing:.1em;margin-top:6px;word-break:break-all;cursor:pointer}
.secret-box:hover{background:rgba(26,48,80,.8)}
.hint{font-size:.6rem;color:var(--cream-dim);margin-top:3px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim)}
input{background:var(--navy-light);border:1px solid var(--rule);border-bottom:2px solid var(--brass-dim);color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:1.3rem;padding:10px 12px;outline:none;transition:border-color .15s;width:100%;letter-spacing:.25em;text-align:center}
input:focus{border-bottom-color:var(--brass-light)}
.btn{width:100%;background:var(--brass);color:var(--navy);border:none;font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .15s}
.btn:hover:not(:disabled){background:var(--brass-light)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:.75rem;color:#e08080;background:rgba(192,57,43,.12);border-left:3px solid var(--red);padding:10px 12px;margin-bottom:16px;display:none}
.error.show{display:block}
.loading{font-size:.75rem;color:var(--cream-dim);padding:32px 0;text-align:center}
</style></head><body>
<div class="brand"><h1>⚓ Harborbucks</h1><p>Voucher Ledger — Internal Use Only</p></div>
<div class="card">
  <div class="card-title">Set Up Authenticator App</div>
  <div class="card-sub">This only needs to be done once.</div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body">Install <strong>Google Authenticator</strong>, <strong>Authy</strong>, or <strong>1Password</strong> on your phone.</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body">Scan the QR code below or enter the key manually.<div id="qr-area"><div class="loading">Generating QR code…</div></div></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body">Enter the 6-digit code from your app to confirm.</div></div>
  </div>
  <div class="error" id="err"></div>
  <div class="field"><label>Verification Code</label>
    <input id="token" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code" autofocus>
  </div>
  <button class="btn" id="btn" onclick="verify()">Confirm & Enter App →</button>
</div>
<script>
let secretKey='';
async function loadQR(){
  try{
    const res=await fetch('/auth/setup-mfa/qr');
    const d=await res.json();
    if(!res.ok){ document.getElementById('qr-area').innerHTML='<div class="loading" style="color:#e08080">Failed to load QR. Refresh to retry.</div>'; return; }
    secretKey=d.secret;
    document.getElementById('qr-area').innerHTML=`<div class="qr-wrap"><img src="${d.qrDataUrl}" alt="QR Code"></div><div class="secret-box" onclick="copySecret()" title="Click to copy">${d.secret}</div><div class="hint">Can't scan? Click the key above to copy and enter it manually.</div>`;
  }catch(e){ document.getElementById('qr-area').innerHTML='<div class="loading" style="color:#e08080">Network error.</div>'; }
}
function copySecret(){ navigator.clipboard?.writeText(secretKey); }
document.getElementById('token').addEventListener('input',e=>{ e.target.value=e.target.value.replace(/\D/g,'').slice(0,6); if(e.target.value.length===6) verify(); });
document.getElementById('token').addEventListener('keydown',e=>{ if(e.key==='Enter') verify(); });
async function verify(){
  const token=document.getElementById('token').value.trim();
  const btn=document.getElementById('btn');
  if(token.length!==6) return showErr('Enter the 6-digit code from your authenticator app.');
  btn.disabled=true; btn.textContent='Verifying…';
  document.getElementById('err').classList.remove('show');
  try{
    const res=await fetch('/auth/setup-mfa/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    const d=await res.json();
    if(!res.ok){ document.getElementById('token').value=''; document.getElementById('token').focus(); return showErr(d.error||'Verification failed.'); }
    window.location.href=d.redirect;
  }catch(e){ showErr('Network error.'); }
  finally{ btn.disabled=false; btn.textContent='Confirm & Enter App →'; }
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}
loadQR();
</script><script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script></body></html>
