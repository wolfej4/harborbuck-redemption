<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Harborbucks — First-Run Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0c1a2e;--navy-mid:#132238;--navy-light:#1a3050;--brass:#c49a3c;--brass-light:#e0b84a;--brass-dim:#8a6a20;--cream:#f0e8d8;--cream-dim:#b8ad99;--red:#c0392b;--rule:rgba(196,154,60,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(196,154,60,.06) 39px,rgba(196,154,60,.06) 40px);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;padding:24px}
.brand{text-align:center;margin-bottom:36px}
.brand h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--brass-light);letter-spacing:.04em;line-height:1}
.brand p{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-dim);margin-top:6px}
.card{background:var(--navy-mid);border:1px solid var(--rule);border-top:3px solid var(--brass);padding:36px 40px;width:100%;max-width:440px}
.card-title{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:6px}
.card-sub{font-size:.72rem;color:var(--cream-dim);margin-bottom:24px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim)}
input,select{background:var(--navy-light);border:1px solid var(--rule);border-bottom:2px solid var(--brass-dim);color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:.92rem;padding:10px 12px;outline:none;transition:border-color .15s;width:100%}
input::placeholder{color:rgba(176,166,148,.35)}
input:focus,select:focus{border-bottom-color:var(--brass-light);background:rgba(26,48,80,.8)}
select option{background:var(--navy-mid)}
.hint{font-size:.6rem;color:var(--cream-dim);margin-top:3px}
.strength{height:3px;background:var(--navy-light);margin-top:4px}
.strength-bar{height:100%;width:0;transition:width .2s,background .2s}
.btn{width:100%;margin-top:8px;background:var(--brass);color:var(--navy);border:none;font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .15s}
.btn:hover:not(:disabled){background:var(--brass-light)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:.75rem;color:#e08080;background:rgba(192,57,43,.12);border-left:3px solid var(--red);padding:10px 12px;margin-bottom:16px;display:none}
.error.show{display:block}
</style></head><body>
<div class="brand"><h1>⚓ Harborbucks</h1><p>Voucher Ledger — Internal Use Only</p></div>
<div class="card">
  <div class="card-title">Create Admin Account</div>
  <div class="card-sub">First-time setup. This account will have full admin access.</div>
  <div class="error" id="err"></div>
  <div class="row2">
    <div class="field"><label>Username</label><input id="username" type="text" autocomplete="username" autofocus></div>
    <div class="field"><label>Initials <span style="color:var(--brass-dim);font-size:.55rem">(2–4 chars)</span></label><input id="initials" type="text" maxlength="4" placeholder="e.g. JW" style="text-transform:uppercase"></div>
  </div>
  <div class="field"><label>Email <span style="color:var(--cream-dim);font-size:.55rem">(optional — needed for password reset)</span></label><input id="email" type="email" placeholder="you@example.com" autocomplete="email"></div>
  <div class="field"><label>Password</label><input id="password" type="password" autocomplete="new-password" oninput="checkStrength()"><div class="strength"><div class="strength-bar" id="sbar"></div></div><div class="hint" id="slabel"></div></div>
  <div class="field"><label>Confirm Password</label><input id="confirm" type="password" autocomplete="new-password"></div>
  <div class="field"><label>MFA Method</label>
    <select id="mfa" onchange="mfaChanged()">
      <option value="none">None — sign in with password only</option>
      <option value="totp">Authenticator App (TOTP)</option>
      <option value="email" id="mfa-email-opt" style="display:none">Email Code</option>
    </select>
    <div class="hint" id="mfa-hint">Email MFA can be enabled after configuring SMTP below.</div>
  </div>

  <div class="field" style="margin-top:8px;margin-bottom:0">
    <label style="cursor:pointer;display:flex;align-items:center;gap:6px">
      <input type="checkbox" id="smtp-toggle" onchange="toggleSmtp()" style="accent-color:var(--brass);width:14px;height:14px">
      Configure SMTP for email features
    </label>
    <div class="hint">Required for email MFA and password resets.</div>
  </div>

  <div id="smtp-section" style="display:none;margin-top:14px;border-top:1px solid var(--rule);padding-top:14px">
    <div class="row2">
      <div class="field"><label>SMTP Host</label><input id="smtp-host" type="text" placeholder="smtp.example.com" autocomplete="off"></div>
      <div class="field"><label>Port</label><input id="smtp-port" type="number" placeholder="587" min="1" max="65535"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Username</label><input id="smtp-user" type="text" placeholder="user@example.com" autocomplete="off"></div>
      <div class="field"><label>Password</label><input id="smtp-pass" type="password" placeholder="app password" autocomplete="off"></div>
    </div>
    <div class="row2">
      <div class="field"><label>From Address</label><input id="smtp-from" type="email" placeholder="noreply@example.com" autocomplete="off"></div>
      <div class="field" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <label style="font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim);cursor:pointer;display:flex;align-items:center;gap:6px">
          <input type="checkbox" id="smtp-secure" style="accent-color:var(--brass);width:14px;height:14px">
          Use TLS / SSL
        </label>
      </div>
    </div>
  </div>

  <button class="btn" id="btn" onclick="setup()">Create Account →</button>
</div>
<script>
function checkStrength(){
  const pw=document.getElementById('password').value;
  let s=0;
  if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const cols=['','#c0392b','#e67e22','#c49a3c','#2e7d52','#3da66e'];
  const labs=['','Weak','Fair','Good','Strong','Very strong'];
  document.getElementById('sbar').style.cssText=`width:${s/5*100}%;background:${cols[s]||'transparent'}`;
  document.getElementById('slabel').textContent=s>0?labs[s]:'';
}
function toggleSmtp(){
  const on=document.getElementById('smtp-toggle').checked;
  document.getElementById('smtp-section').style.display=on?'block':'none';
  document.getElementById('mfa-email-opt').style.display=on?'':'none';
  if(!on&&document.getElementById('mfa').value==='email') document.getElementById('mfa').value='none';
  mfaChanged();
}
function mfaChanged(){
  const v=document.getElementById('mfa').value;
  const hint=document.getElementById('mfa-hint');
  if(v==='email'&&!document.getElementById('email').value.trim()){
    hint.textContent='An email address is required for email MFA.';
    hint.style.color='#e08080';
  } else if(v==='email'){
    hint.textContent='A 6-digit code will be sent to your email each sign-in.';
    hint.style.color='';
  } else {
    hint.textContent='Email MFA can be enabled after configuring SMTP below.';
    hint.style.color='';
  }
}
async function setup(){
  const username=document.getElementById('username').value.trim();
  const initials=document.getElementById('initials').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const confirmPassword=document.getElementById('confirm').value;
  const mfaType=document.getElementById('mfa').value;
  const btn=document.getElementById('btn');
  if(!username||!password) return showErr('Username and password are required.');
  if(!/^[A-Za-z0-9]{2,4}$/.test(initials)) return showErr('Initials must be 2–4 letters/numbers.');
  if(password!==confirmPassword) return showErr('Passwords do not match.');
  if(password.length<8) return showErr('Password must be at least 8 characters.');
  if(mfaType==='email'&&!email) return showErr('Email address is required for email MFA.');
  const body={username,email,password,confirmPassword,initials,mfaType};
  if(document.getElementById('smtp-toggle').checked){
    const host=document.getElementById('smtp-host').value.trim();
    if(!host) return showErr('SMTP host is required when configuring email.');
    body.smtp={
      host,
      port:parseInt(document.getElementById('smtp-port').value)||587,
      user:document.getElementById('smtp-user').value.trim(),
      pass:document.getElementById('smtp-pass').value,
      from:document.getElementById('smtp-from').value.trim(),
      secure:document.getElementById('smtp-secure').checked,
    };
  }
  btn.disabled=true; btn.textContent='Creating account…';
  try{
    const r1=await fetch('/auth/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d1=await r1.json();
    if(!r1.ok) return showErr(d1.error||'Setup failed.');
    window.location.href=d1.redirect||'/';
  }catch(e){ showErr('Network error.'); }
  finally{ btn.disabled=false; btn.textContent='Create Account →'; }
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}
</script></body></html>
