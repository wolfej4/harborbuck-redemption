<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Harborbucks — Sign In</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0c1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#0c1a2e;--navy-mid:#132238;--navy-light:#1a3050;--brass:#c49a3c;--brass-light:#e0b84a;--brass-dim:#8a6a20;--cream:#f0e8d8;--cream-dim:#b8ad99;--red:#c0392b;--rule:rgba(196,154,60,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(196,154,60,.06) 39px,rgba(196,154,60,.06) 40px);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;padding:24px}
.brand{text-align:center;margin-bottom:36px}
.brand h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:900;color:var(--brass-light);letter-spacing:.04em;line-height:1}
.brand p{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--brass-dim);margin-top:6px}
.card{background:var(--navy-mid);border:1px solid var(--rule);border-top:3px solid var(--brass);padding:36px 40px;width:100%;max-width:380px}
.card-title{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:24px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brass-dim)}
input{background:var(--navy-light);border:1px solid var(--rule);border-bottom:2px solid var(--brass-dim);color:var(--cream);font-family:'IBM Plex Mono',monospace;font-size:.92rem;padding:10px 12px;outline:none;transition:border-color .15s,background .15s;width:100%}
input::placeholder{color:rgba(176,166,148,.35)}
input:focus{border-bottom-color:var(--brass-light);background:rgba(26,48,80,.8)}
.btn{width:100%;margin-top:8px;background:var(--brass);color:var(--navy);border:none;font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .15s}
.btn:hover:not(:disabled){background:var(--brass-light)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error{font-size:.75rem;color:#e08080;background:rgba(192,57,43,.12);border-left:3px solid var(--red);padding:10px 12px;margin-bottom:16px;display:none}
.error.show{display:block}
.links{display:flex;justify-content:space-between;margin-top:18px;flex-wrap:wrap;gap:8px}
.links a{font-size:.68rem;color:var(--brass-dim);text-decoration:none;letter-spacing:.06em}
.links a:hover{color:var(--brass)}
.divider{display:none;align-items:center;gap:10px;margin:20px 0 14px;color:var(--brass-dim);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--rule)}
.divider.show{display:flex}
.btn-sso{display:none;width:100%;background:transparent;color:var(--brass-light);border:1px solid var(--brass-dim);font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:12px;cursor:pointer;text-align:center;text-decoration:none;transition:all .15s}
.btn-sso.show{display:block}
.btn-sso:hover{border-color:var(--brass-light);background:rgba(196,154,60,.08)}
</style></head><body>
<div class="brand"><h1>⚓ Harborbucks</h1><p>Voucher Ledger — Internal Use Only</p></div>
<div class="card">
  <div class="card-title">Sign In</div>
  <div class="error" id="err"></div>
  <div class="field"><label>Username</label><input id="username" type="text" placeholder="username" autocomplete="username" autofocus></div>
  <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" autocomplete="current-password"></div>
  <button class="btn" id="btn" onclick="login()">Sign In</button>
  <div class="divider" id="sso-divider">or</div>
  <a class="btn-sso" id="sso-btn" href="/auth/oidc/login">Sign in with SSO</a>
  <div class="links">
    <a href="/reset-request" id="reset-link" style="display:none">Forgot password?</a>
    <a href="/register" id="reg-link" style="display:none">Create account →</a>
  </div>
</div>
<script>
document.getElementById('password').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
const ssoErr=new URLSearchParams(location.search).get('sso_error');
if(ssoErr) showErr('SSO: '+ssoErr);
fetch('/api/public-config').then(r=>r.json()).then(cfg=>{
  if(cfg.allowRegistration) document.getElementById('reg-link').style.display='';
  if(cfg.smtpConfigured)    document.getElementById('reset-link').style.display='';
  if(cfg.oidc?.enabled){
    const btn=document.getElementById('sso-btn');
    btn.textContent=cfg.oidc.label||'Sign in with SSO';
    btn.classList.add('show');
    document.getElementById('sso-divider').classList.add('show');
  }
});
async function login(){
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('btn');
  if(!username||!password) return showErr('Please enter your username and password.');
  btn.disabled=true; btn.textContent='Signing in…'; hideErr();
  try{
    const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await res.json();
    if(!res.ok) return showErr(d.error||'Login failed.');
    window.location.href=d.redirect;
  }catch(e){ showErr('Network error. Please try again.'); }
  finally{ btn.disabled=false; btn.textContent='Sign In'; }
}
function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}
</script><script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script></body></html>
