version: "3.8"

services:
  harborbucks:
    build: .
    container_name: harborbucks
    restart: unless-stopped
    ports:
      - "8099:3000"
    volumes:
      - /opt/appdata/harborbucks:/data
    environment:
      - DB_PATH=/data/harborbucks.db
      - LOG_PATH=/data/harborbucks.log
      - PORT=3000
      - SECURE_COOKIES=false
